name: Docker CI Pipeline

on:
  push:
    branches:
      - main
env:
  DOCKER_USERNAME: joshi2106
  
jobs:
  build-push-run:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t myimagev1 .

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u $DOCKER_USERNAME --password-stdin

      - name: Tag Docker Image
        run: docker tag myimagev1 $DOCKER_USERNAME/firstrepo:Image001

      - name: Push Image to DockerHub
        run: docker push $DOCKER_USERNAME/firstrepo:Image001

      - name: Run Container
        run: docker run -d --name cont-2 -p 1264:80 $DOCKER_USERNAME/firstrepo:Image001
