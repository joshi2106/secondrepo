name: Docker CI Pipeline

on:
  push:
    branches: [ main ]

env:
  DOCKER_USERNAME: joshi2106

jobs:

  build-push-run:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t myimage .

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u joshi2106 --password-stdin

      - name: Tag Docker Image
        run: docker tag myimage $DOCKER_USERNAME/myfirstrepo:Image5

      - name: Push Image to DockerHub
        run: docker push $DOCKER_USERNAME/myfirstrepo:Image5

      - name: Run Container
        run: docker run -itd --name container00001 -p 1264:8080 $DOCKER_USERNAME/myfirstrepo:Image5
